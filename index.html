    <script>
        const API_KEY = 'AIzaSyCD88QgRzIYReFybGPz4FVYYa24A3T-xJU';
        const CHANNEL_HANDLE = '@rafael_xrb';
        const FALLBACK_ID = 'UC3-Y367N8XyO8o8p964p74w';

        async function init() {
            try {
                // Passo 1: Obter ID do canal
                const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${CHANNEL_HANDLE}&type=channel&key=${API_KEY}`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();

                let channelId = FALLBACK_ID;
                if (searchData.items && searchData.items.length > 0) {
                    channelId = searchData.items[0].id.channelId;
                }

                // Passo 2: Obter estatísticas do canal
                const chanRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&id=${channelId}&key=${API_KEY}`);
                const chanData = await chanRes.json();

                if (!chanData.items) return;

                const channel = chanData.items[0];
                const uploadsId = channel.contentDetails.relatedPlaylists.uploads;

                document.getElementById('chan-icon').innerHTML = `<img src="${channel.snippet.thumbnails.default.url}" class="w-full h-full object-cover">`;
                document.getElementById('stat-subs').innerText = format(channel.statistics.subscriberCount);
                document.getElementById('stat-views').innerText = format(channel.statistics.viewCount);
                document.getElementById('hero-title').innerText = channel.snippet.title;

                // Passo 3: Obter vídeos mais recentes
                const videoRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploadsId}&maxResults=10&key=${API_KEY}`);
                const videoData = await videoRes.json();

                if (videoData.items && videoData.items.length > 0) {
                    const videos = videoData.items;
                    
                    // Destaque (Primeiro vídeo)
                    const latest = videos[0];
                    document.getElementById('hero-desc').innerText = latest.snippet.description.substring(0, 150) + "...";
                    document.getElementById('main-player').innerHTML = `<iframe src="https://www.youtube.com/embed/${latest.contentDetails.videoId}" allowfullscreen></iframe>`;

                    // Grelha de Vídeos (Restantes)
                    const grid = document.getElementById('video-grid');
                    grid.innerHTML = '';
                    videos.slice(1, 7).forEach(v => {
                        grid.innerHTML += `
                            <a href="https://youtube.com/watch?v=${v.contentDetails.videoId}" target="_blank" class="glass p-4 rounded-[2rem] video-card-hover block group">
                                <img src="${v.snippet.thumbnails.high.url}" class="rounded-2xl w-full aspect-video object-cover mb-4">
                                <h3 class="font-bold text-sm line-clamp-2 group-hover:text-red-500">${v.snippet.title}</h3>
                                <p class="text-[10px] text-gray-500 mt-2 uppercase font-bold tracking-widest">${new Date(v.snippet.publishedAt).toLocaleDateString('pt-PT')}</p>
                            </a>
                        `;
                    });
                }
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        function format(num) {
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        window.onload = init;
    </script>
</body>
