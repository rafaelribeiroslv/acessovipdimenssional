<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Streamer 10x - Tema Azul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .video-box {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #0f172a; /* Slate 900 */
            border: 2px solid #1e3a8a; /* Blue 900 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, border-color 0.2s;
        }
        .video-box:hover {
            transform: scale(1.02);
            border-color: #3b82f6; /* Blue 500 */
        }
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-blue-50 font-sans min-h-screen">

    <!-- Header / Navbar -->
    <nav class="sticky top-0 z-50 bg-[#0f172a]/90 border-b border-blue-900/50 p-5 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 .6-.03 1.29-.1 2.09-.06.8-.15 1.43-.28 1.9-.13.47-.29.83-.48 1.1-.19.27-.43.48-.71.63-.28.15-.62.26-1.02.33-.4.07-1.01.12-1.83.15-.82.03-1.63.04-2.43.04l-3.15-.02c-.8-.01-1.61-.02-2.43-.05-.82-.03-1.43-.08-1.83-.15-.4-.07-.74-.18-1.02-.33-.28-.15-.52-.36-.71-.63-.19-.27-.35-.63-.48-1.1-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-.6.03-1.29.1-2.09.06-.8.15-1.43.28-1.9.13-.47.29-.83.48-1.1.19-.27.43-.48.71-.63.28-.15.62-.26 1.02-.33.4-.07 1.01-.12 1.83-.15.82-.03 1.63-.04 2.43-.04l3.15.02c.8.01 1.61.02 2.43.05.82.03 1.43.08 1.83.15.4.07.74.18 1.02.33.28.15.52.36.71.63.19.27.35.63.48 1.1z"/></svg>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-blue-100">BLUE<span class="text-blue-500">STREAM</span></h1>
            </div>

            <div class="flex-1 flex w-full gap-3">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="Cole o link do vídeo aqui..."
                    class="flex-1 bg-slate-800/50 border border-blue-900 rounded-xl px-5 py-3 text-sm focus:border-blue-400 outline-none transition-all placeholder:text-slate-500"
                >
                <button 
                    onclick="startMulti()" 
                    id="mainBtn"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-600/30 active:scale-95 flex items-center gap-2"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"/></svg>
                    INICIAR 10x
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div id="videoGrid" class="video-grid">
            <div class="col-span-full py-32 text-center flex flex-col items-center opacity-40">
                <div class="w-20 h-20 border-2 border-dashed border-blue-500 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="3" rx="2" ry="2"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <h2 class="text-xl font-medium text-blue-200">Pronto para a Transmissão</h2>
                <p class="text-sm mt-2">Aguardando o link do YouTube para gerar as 10 janelas.</p>
            </div>
        </div>
    </main>

    <!-- Status Bar -->
    <footer id="statusBar" class="fixed bottom-0 left-0 right-0 bg-blue-950 border-t border-blue-900 p-2 hidden">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span id="statusText" class="text-[10px] font-bold uppercase tracking-widest text-blue-300">Carregando...</span>
            </div>
            <div id="counter" class="text-[10px] font-mono text-blue-400">0/10</div>
        </div>
    </footer>

    <script>
        function getID(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function startMulti() {
            const url = document.getElementById('videoUrl').value;
            const id = getID(url);
            
            if (!id) {
                alert("Por favor, cole um link válido do YouTube.");
                return;
            }

            const grid = document.getElementById('videoGrid');
            const btn = document.getElementById('mainBtn');
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const counter = document.getElementById('counter');

            grid.innerHTML = '';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            statusBar.classList.remove('hidden');
            
            // Carregamento sequencial para 10 janelas
            for (let i = 0; i < 10; i++) {
                statusText.innerText = `Gerando Instância ${i + 1}`;
                counter.innerText = `${i + 1}/10`;

                const box = document.createElement('div');
                box.className = 'video-box';
                
                // Parâmetros para garantir o carregamento
                const ts = new Date().getTime() + i;
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1&modestbranding=1&rel=0&vq=small&t=${ts}`;
                iframe.allow = "autoplay; encrypted-media; picture-in-picture";
                iframe.setAttribute('allowfullscreen', '');
                iframe.frameBorder = "0";
                
                box.appendChild(iframe);
                grid.appendChild(box);

                // Delay curto entre janelas (200ms) para fluidez visual
                await new Promise(r => setTimeout(r, 200));
            }

            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            statusText.innerText = "Transmissão Ativa";
        }
    </script>
</body>
</html>
